<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Страны мира</title>
    <script defer src="./assets/index-BnGf_8Vl.js"></script>
    <link rel="stylesheet" href="./assets/index-C12WO67q.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        if (window.parent === window) {
          return;
        }

        document.documentElement.classList.add("streamlit-embedded");

        const syncParentViewport = () => {
          try {
            const parentHeight = window.parent.innerHeight;

            if (Number.isFinite(parentHeight) && parentHeight > 0) {
              document.documentElement.style.setProperty("--streamlit-parent-height", `${parentHeight}px`);
              document.documentElement.classList.add("streamlit-embedded--parent-sized");
            }
          } catch {
            // The top-aligned embedded layout remains as a safe fallback.
          }
        };

        const sendMessage = (type, payload = {}) => {
          window.parent.postMessage({ isStreamlitMessage: true, type, ...payload }, "*");
        };

        const syncHeight = () => {
          const height = Math.ceil(
            Math.max(document.documentElement.scrollHeight, document.body?.scrollHeight ?? 0),
          );
          sendMessage("streamlit:setFrameHeight", { height });
        };

        syncParentViewport();
        sendMessage("streamlit:componentReady", { apiVersion: 1 });

        const observeHeight = () => {
          syncHeight();

          if (typeof ResizeObserver !== "undefined") {
            const observer = new ResizeObserver(() => window.requestAnimationFrame(syncHeight));
            observer.observe(document.documentElement);
            observer.observe(document.body);
          }

          window.addEventListener("resize", () => {
            syncParentViewport();
            syncHeight();
          });
        };

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", observeHeight, { once: true });
        } else {
          observeHeight();
        }
      })();
    </script>
  </body>
</html>
