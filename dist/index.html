<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Страны мира</title>
    <script defer src="./assets/index-DckFwsmr.js"></script>
    <link rel="stylesheet" href="./assets/index-BhxLoTKE.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        if (window.parent === window) {
          return;
        }

        document.documentElement.classList.add("streamlit-embedded");

        const sendMessage = (type, payload = {}) => {
          window.parent.postMessage({ isStreamlitMessage: true, type, ...payload }, "*");
        };

        const syncHeight = () => {
          const height = Math.ceil(
            Math.max(document.documentElement.scrollHeight, document.body?.scrollHeight ?? 0),
          );
          sendMessage("streamlit:setFrameHeight", { height });
        };

        sendMessage("streamlit:componentReady", { apiVersion: 1 });

        const observeHeight = () => {
          syncHeight();

          if (typeof ResizeObserver !== "undefined") {
            const observer = new ResizeObserver(() => window.requestAnimationFrame(syncHeight));
            observer.observe(document.documentElement);
            observer.observe(document.body);
          }

          window.addEventListener("resize", syncHeight);
        };

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", observeHeight, { once: true });
        } else {
          observeHeight();
        }
      })();
    </script>
  </body>
</html>
